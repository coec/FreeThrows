<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Free Throw Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Free Throw Tracker</h1>
    <nav>
      <button onclick="showScreen('record')">Record</button>
      <button onclick="showScreen('setup')">Setup</button>
      <button onclick="showScreen('reports')">Reports</button>
    </nav>
  </header>

  <main>
    <section id="record" class="screen active">
      <h2>Record Shots</h2>

      <label>
        Event
        <select id="currentEvent" onchange="setCurrentEvent()"></select>
      </label>

      <div id="recordingArea"></div>
    </section>

    <section id="setup" class="screen">
      <h2>Setup</h2>

      <div class="card">
        <h3>Teams</h3>
        <input id="teamName" placeholder="Team name">
        <button onclick="addTeam()">Add Team</button>
        <select id="teamSelect"></select>
      </div>

<div class="card">
  <h3>Players</h3>
  <input id="playerName" placeholder="Player name">
  <button onclick="addPlayer()">Add Player</button>
</div>

<div class="card">
  <h3>Manage Team Members</h3>

  <div class="member-grid">
    <div>
      <h4>Available players</h4>
      <div id="availablePlayers"></div>
    </div>

    <div>
      <h4>Team members</h4>
      <div id="teamMembers"></div>
    </div>
  </div>
</div>

<div class="card">
  <h3>New Event</h3>

  <label>
    Event type
    <select id="eventType" onchange="refreshSetup()">
      <option value="team">Team event</option>
      <option value="individual">Individual event</option>
    </select>
  </label>

  <label>
    Purpose
    <select id="eventPurpose">
      <option value="training">Training</option>
      <option value="game">Game</option>
      <option value="warmup">Warm-up</option>
      <option value="individual-practice">Individual practice</option>
    </select>
  </label>

  <label>
    Individual player
    <select id="eventPlayerSelect"></select>
  </label>

  <input id="eventName" placeholder="Event name, e.g. Round 9 v Tigers">

  <button onclick="addEvent()">Create Event</button>
</div>
    </section>

    <section id="reports" class="screen">
      <h2>Reports</h2>

      <div class="card">
        <button onclick="showEventReport()">Event Report</button>
        <button onclick="showTeamReport()">Team Report</button>
        <button onclick="showAllPlayersReport()">All Players Report</button>
        <button onclick="copyReport()">Copy Report</button>
      </div>

      <div class="card">
        <h3>Export / Import</h3>
        <button onclick="exportSelectedTeam()">Export Selected Team</button>
        <input type="file" accept=".json" onchange="importTeam(event)">
      </div>

      <pre id="reportOutput">Choose a report.</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
